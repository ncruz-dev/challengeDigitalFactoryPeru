spring:
  application:
    name: digitalFactoryPeru
  r2dbc:
    url: r2dbc:h2:mem:///factory-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ''
    pool:
      initial-size: 10
      max-size: 20
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html

